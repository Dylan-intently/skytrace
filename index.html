<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SkyTrace — Live Flight Tracker</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet"/>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0e;--s1:#0f1117;--s2:#161822;--s3:#1c1f2e;--s4:#232638;
  --border:rgba(255,255,255,0.07);--text:#e8eaf0;--muted:#6b7280;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);--blue-glow:rgba(59,130,246,0.35);
  --green:#22c55e;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --glass:rgba(15,17,23,0.85);--r:14px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
.glass{background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%)}

/* Map */
#map{position:fixed;inset:0;width:100%;height:100%}
.mapboxgl-ctrl-bottom-left,.mapboxgl-ctrl-bottom-right,.mapboxgl-ctrl-attrib{display:none!important}
.mapboxgl-popup-content{background:rgba(15,17,23,.97)!important;border:1px solid var(--border)!important;border-radius:10px!important;padding:0!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.mapboxgl-popup-tip{display:none!important}
.tt{padding:8px 11px}
.tt-flight{font-size:13px;font-weight:600;margin-bottom:2px}
.tt-route{font-size:11px;color:var(--muted);margin-bottom:4px}
.tt-data{font-size:10px;color:#9ca3af;font-family:var(--mono)}

/* Nav */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--glass);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);flex-shrink:0}
.logo-icon{width:28px;height:28px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px var(--blue-glow)}
.logo-icon svg{width:14px;height:14px;fill:white}
.logo-text{font-size:14px;font-weight:600;letter-spacing:-.02em}
.ndiv{width:1px;height:20px;background:var(--border);flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:6px;padding:0 10px;height:30px;border-radius:8px;border:none;background:none;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:color .15s,background .15s;white-space:nowrap;text-decoration:none}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-btn.active{color:var(--blue);background:var(--blue-dim)}
.nav-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:4px}

/* Search */
#sw{position:relative;flex:1;max-width:420px}
#si{width:100%;height:32px;border-radius:10px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:var(--font);font-size:13px;padding:0 32px;outline:none;transition:border-color .2s,box-shadow .2s}
#si::placeholder{color:var(--muted)}
#si:focus{border-color:rgba(59,130,246,.5);box-shadow:0 0 0 3px var(--blue-dim)}
.si-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.si-icon svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2}
#sc{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:none;padding:2px;line-height:0}
#sc svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
#sd{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden;display:none;z-index:200;max-height:400px;overflow-y:auto}
#sd.open{display:block}
.ds-label{font-size:10px;color:var(--muted);padding:10px 12px 4px;text-transform:uppercase;letter-spacing:.06em}
.dr{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .15s}
.dr:hover{background:rgba(255,255,255,.04)}
.dr-icon{width:28px;height:28px;border-radius:8px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dr-icon svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2}
.dr-t{font-size:13px;font-weight:500}
.dr-s{font-size:11px;color:var(--muted);margin-top:1px}
.no-res{padding:20px 12px;text-align:center;font-size:13px;color:var(--muted)}

/* Sidebar */
#sidebar{position:fixed;left:0;top:52px;bottom:0;width:268px;z-index:90;background:var(--glass);border-right:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;transform:translateX(0);transition:transform .35s cubic-bezier(.16,1,.3,1)}
#sidebar.hidden{transform:translateX(-100%)}
.sb-tabs{display:flex;gap:4px;padding:8px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.sb-tabs::-webkit-scrollbar{display:none}
.sb-tab{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;border:none;background:none;color:var(--muted);font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.sb-tab:hover{color:var(--text);background:rgba(255,255,255,.05)}
.sb-tab.active{color:var(--blue);background:var(--blue-dim)}
.sb-tab svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.sb-body{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* Live bar */
.live-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 4px}
.live-ind{display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-lbl{font-size:11px;color:var(--green);font-weight:500}
.live-cnt{font-size:11px;color:var(--muted)}

/* Flight items */
.fi{padding:10px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.fi:hover{background:rgba(255,255,255,.04)}
.fi.sel{background:var(--blue-dim);outline:1px solid rgba(59,130,246,.3)}
.fi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.fi-cs{font-size:13px;font-weight:600}
.fi-al{font-size:11px;color:var(--muted)}
.fi-route{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.fi-iata{font-size:11px;font-weight:600}
.fi-bar{flex:1;height:2px;background:var(--s3);border-radius:1px;position:relative}
.fi-fill{position:absolute;left:0;top:0;height:100%;background:var(--blue);border-radius:1px}
.fi-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);position:absolute;top:50%;transform:translate(-50%,-50%)}
.fi-stats{display:flex;gap:8px;font-size:10px;color:var(--muted);font-family:var(--mono)}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:10px}
.empty-icon{width:48px;height:48px;border-radius:14px;background:var(--s3);display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.5}
.empty-txt{font-size:12px;color:var(--muted);line-height:1.6;max-width:170px}

/* Filter */
.f-sec{padding:4px}
.f-title{font-size:12px;font-weight:600;margin-bottom:12px;padding:0 4px;display:flex;align-items:center;justify-content:space-between}
.f-reset{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:var(--font)}
.f-reset:hover{color:var(--text)}
.f-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding:0 4px}
.f-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.chip{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:500;background:var(--s3);color:var(--muted);border:none;cursor:pointer;font-family:var(--font);transition:all .15s}
.chip:hover{color:var(--text)}
.chip.active{background:var(--blue-dim);color:var(--blue)}
.f-sw{margin-bottom:14px}
.f-sh{display:flex;justify-content:space-between;margin-bottom:6px}
.f-sv{font-size:10px;font-family:var(--mono);color:var(--text)}
input[type=range]{width:100%;accent-color:var(--blue);cursor:pointer}

/* Detail panel */
#dp{position:fixed;right:0;top:52px;bottom:0;width:300px;z-index:90;background:var(--glass);border-left:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
#dp.open{transform:translateX(0)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.pt{display:flex;align-items:center;gap:8px}
.picon{width:30px;height:30px;border-radius:8px;background:var(--blue-dim);display:flex;align-items:center;justify-content:center}
.picon svg{width:14px;height:14px;stroke:var(--blue);fill:none;stroke-width:2}
.pfn{font-size:13px;font-weight:600}
.pan{font-size:11px;color:var(--muted)}
.pclose{width:26px;height:26px;border-radius:7px;border:none;background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pclose:hover{background:rgba(255,255,255,.06);color:var(--text)}
.pclose svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.pb{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.pb::-webkit-scrollbar{width:3px}
.pb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* Status */
.sbadge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.s-er{color:var(--green);background:rgba(34,197,94,.12)}
.s-bd{color:var(--blue);background:var(--blue-dim)}
.s-dl{color:var(--orange);background:rgba(245,158,11,.12)}
.s-ld{color:var(--purple);background:rgba(139,92,246,.12)}
.s-cn{color:var(--red);background:rgba(239,68,68,.12)}

/* Route card */
.rcard{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.rrow{display:flex;align-items:center;gap:8px}
.rap{flex:1}
.riata{font-size:22px;font-weight:700;line-height:1}
.rcity{font-size:10px;color:var(--muted);margin-top:2px}
.rtime{font-size:11px;color:var(--blue);margin-top:3px;font-family:var(--mono)}
.rmid{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.rplane{font-size:14px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.rlw{width:100%;display:flex;align-items:center;gap:2px}
.rdone{height:2px;border-radius:1px;background:var(--blue)}
.rrem{flex:1;height:1px;background:var(--s4)}
.rpct{font-size:10px;color:var(--muted)}
.pbar{width:100%;height:3px;background:var(--s3);border-radius:2px;margin-top:10px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),#60a5fa);transition:width .5s ease}

/* Tiles */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.tile{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px}
.tlbl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);margin-bottom:5px}
.tlbl svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2}
.tval{font-size:13px;font-weight:600;font-family:var(--mono)}
.tval.up{color:var(--green)}
.tval.dn{color:var(--orange)}

/* Info card */
.icard{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.irow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.irow:last-child{border-bottom:none}
.ik{font-size:11px;color:var(--muted)}
.iv{font-size:11px;font-weight:500;font-family:var(--mono)}

/* Section label */
.slbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px;padding:0 1px}

/* Panel actions */
.pa{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.abtn{flex:1;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.abtn:hover{background:var(--s3)}
.abtn.primary{background:var(--blue-dim);border-color:rgba(59,130,246,.3);color:var(--blue)}
.abtn.primary:hover{background:rgba(59,130,246,.25)}
.abtn.primary.on{background:var(--blue);color:white;border-color:var(--blue);box-shadow:0 0 10px var(--blue-glow)}
.abtn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* Map controls */
#zc{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:80;display:flex;flex-direction:column;gap:4px}
.zb{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;transition:all .15s}
.zb:hover{background:var(--s3)}
.zb svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.zd{height:1px;background:var(--border);margin:2px 0}

/* Stats bar */
#sb{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:80;display:flex;align-items:center;gap:14px;padding:8px 18px;border-radius:20px;background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(16px);font-size:11px;white-space:nowrap}
.si2{display:flex;align-items:center;gap:5px}
.sdv{width:1px;height:12px;background:var(--border)}

/* Airport modal */
#am{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
#am.open{display:flex}
.mbox{width:90%;max-width:720px;max-height:80vh;border-radius:20px;overflow:hidden;background:var(--s1);border:1px solid var(--border);display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.7)}
.mhdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt{font-size:16px;font-weight:700}
.ms{font-size:12px;color:var(--muted);margin-top:2px}
.mcl{width:28px;height:28px;border-radius:8px;border:none;background:var(--s2);color:var(--muted);cursor:pointer;font-size:16px;transition:all .15s}
.mcl:hover{color:var(--text);background:var(--s3)}
.mbdy{flex:1;overflow-y:auto;padding:14px 18px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.mtabs{display:flex;gap:6px;margin-bottom:14px}
.mtab{padding:5px 12px;border-radius:8px;border:none;background:var(--s2);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.mtab.active{background:var(--blue-dim);color:var(--blue)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
td{font-size:12px;padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.tmono{font-family:var(--mono)}
.dly{color:var(--orange);font-size:10px}

/* Settings modal */
#sm{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
#sm.open{display:flex}
.sbox{width:90%;max-width:440px;border-radius:20px;background:var(--s1);border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,.7);overflow:hidden}
.ssec{padding:16px 18px;border-bottom:1px solid var(--border)}
.ssec:last-child{border-bottom:none}
.stitle{font-size:12px;font-weight:600;margin-bottom:12px;color:var(--blue)}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.srow:last-child{margin-bottom:0}
.slabel{font-size:13px}
.sdesc{font-size:11px;color:var(--muted);margin-top:1px}
.tog{width:36px;height:20px;border-radius:10px;background:var(--s3);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--blue)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:white;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(16px)}
.ogrp{display:flex;gap:4px;flex-wrap:wrap}
.obtn{padding:4px 10px;border-radius:7px;border:none;background:var(--s3);color:var(--muted);font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.obtn.active{background:var(--blue-dim);color:var(--blue)}

/* Toast */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:12px;z-index:999;backdrop-filter:blur(12px);pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

@media(max-width:640px){
  #sidebar{width:240px}
  #dp{width:100%}
  .logo-text,.nav-btn span{display:none}
}
</style>
</head>
<body>

<div id="map"></div>

<nav id="nav">
  <a class="logo" href="#">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></div>
    <span class="logo-text">SkyTrace</span>
  </a>
  <div class="ndiv"></div>
  <button class="nav-btn active" id="menu-btn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    <span>Menu</span>
  </button>
  <div id="sw">
    <div class="si-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <input type="text" id="si" placeholder="Search flights, airports, airlines…" autocomplete="off" spellcheck="false"/>
    <button id="sc" onclick="clearSearch()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div id="sd"></div>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="openAirportModal('EGLL')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <span>Airports</span>
    </button>
    <button class="nav-btn" onclick="openSettings()">

<script>

const AIRPORTS = [

// ─── State ────────────────────────────────────────────────────────────
const ST = {
  flights: [],
  selectedId: null,
  sidebarOpen: true,
  activeTab: 'live',
  filters: { cats: [], maxAlt: 60000, maxSpeed: 700 },
  settings: { mapStyle: 'dark', units: 'aviation' },
  saved: JSON.parse(localStorage.getItem('st_saved') || '[]'),

  airportTab: 'dep',
  airportIcao: null,
}

// ─── Helpers ──────────────────────────────────────────────────────────
const R = (a,b) => Math.random()*(b-a)+a
const RI = (a,b) => Math.floor(R(a,b))
const PK = arr => arr[RI(0,arr.length)]
const FLAG = cc => (cc && cc.length===2) ? String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0))) : '🌐'

function fmtAlt(ft) {
  if (!ft) return '—'
  if (ST.settings.units === 'metric') return `${Math.round(ft*0.3048).toLocaleString()} m`
  if (ft >= 18000) return `FL${Math.round(ft/100)}`
  return `${ft.toLocaleString()} ft`
}
function fmtSpd(kts) {
  if (!kts) return '—'
  if (ST.settings.units === 'metric') return `${Math.round(kts*1.852)} km/h`
  if (ST.settings.units === 'imperial') return `${Math.round(kts*1.15)} mph`
  return `${kts} kts`
}
function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) } catch { return '--:--' }
}
function fmtFromNow(iso) {
  if (!iso) return '—'
  const m = (new Date(iso) - Date.now()) / 60000
  if (m < 0) return 'Landed'
  if (m < 60) return `${Math.round(m)}m`
  return `${Math.floor(m/60)}h ${Math.round(m%60)}m`
}
function hdgBetween(a, b) {
  const dL = ((b.lon-a.lon)*Math.PI)/180
  const y = Math.sin(dL)*Math.cos(b.lat*Math.PI/180)
  const x = Math.cos(a.lat*Math.PI/180)*Math.sin(b.lat*Math.PI/180) - Math.sin(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.cos(dL)
  return ((Math.atan2(y,x)*180/Math.PI)+360)%360
}
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2500)
}

// ─── OpenSky ──────────────────────────────────────────────────────────
function guessAirline(callsign) {
  if (!callsign || !callsign.trim()) return {iata:'??',name:'Unknown',cc:'UN'}
  const prefix = callsign.trim().slice(0,3).toUpperCase()
  return AIRLINE_MAP[prefix] || {iata:callsign.trim().slice(0,2), name:callsign.trim(), cc:'UN'}
}

function parseOpenSky(states) {
  return states.map(s => {
    const icao24 = s[0], callsign = (s[1]||'').trim()
    const lon = s[5], lat = s[6]
    const balt = s[7], onGround = s[8]
    const spd = s[9], hdg = s[10], vrate = s[11]
    if (!lat || !lon || onGround) return null
    const altFt = balt ? Math.round(balt * 3.28084) : 0
    const spdKts = spd ? Math.round(spd * 1.94384) : 0
    const vrateFpm = vrate ? Math.round(vrate * 196.85) : 0
    const airline = guessAirline(callsign)
    return {
      id: icao24, callsign: callsign || icao24,
      icao24: icao24.toUpperCase(), airline,
      acType: {icao:'—', name:'—'},
      orig: {iata:'—',city:'—',lon:0,lat:0,cc:'UN'},
      dest: {iata:'—',city:'—',lon:0,lat:0,cc:'UN'},
      lat, lon, hdg: hdg||0, alt: altFt, spd: spdKts,
      vrate: vrateFpm, squawk: s[11]||'0000',
      progress: 50, status:'enroute',
      eta: null, distNm: null, isLive: true,
    }
  }).filter(Boolean)
}

async function fetchOpenSky() {
  try {
    const res = await fetch('https://opensky-network.org/api/states/all', {
      signal: AbortSignal.timeout(15000)
    })
    if (res.status === 429) { toast('OpenSky rate limited — retrying in 15s'); return false }
    if (!res.ok) throw new Error(`HTTP ${res.status}`)
    const data = await res.json()
    const parsed = parseOpenSky(data.states || [])
    if (parsed.length < 5) throw new Error('Too few results')
    ST.flights = parsed
    setCount(parsed.length, false)
    return true
  } catch(e) {
    console.warn('OpenSky error:', e.message)
    return false
  }
}

// ─── Mock data ────────────────────────────────────────────────────────
const AIRLINES_LIST = Object.values(AIRLINE_MAP)
const AC_TYPES = [
  {icao:'B738',name:'Boeing 737-800'},{icao:'B77W',name:'Boeing 777-300ER'},
  {icao:'B789',name:'Boeing 787-9'},{icao:'A320',name:'Airbus A320'},
  {icao:'A321',name:'Airbus A321'},{icao:'A359',name:'Airbus A350-900'},
  {icao:'A388',name:'Airbus A380-800'},{icao:'E190',name:'Embraer E190'},
]

function generateMock(n=200) {
  return Array.from({length:n}, (_,i) => {
    const al=PK(AIRLINES_LIST), ac=PK(AC_TYPES)
    const orig=PK(AIRPORTS); let dest=PK(AIRPORTS); while(dest===orig) dest=PK(AIRPORTS)
    const prog=R(.05,.95)
    const lat=orig.lat+(dest.lat-orig.lat)*prog + R(-3,3)
    const lon=orig.lon+(dest.lon-orig.lon)*prog + R(-3,3)
    return {
      id:`m${i}`, callsign:`${al.iata}${RI(100,9999)}`,
      icao24:Math.random().toString(16).slice(2,8).toUpperCase(),
      airline:al, acType:ac, orig, dest,
      lat, lon, hdg:hdgBetween({lat,lon},{lat:dest.lat,lon:dest.lon}),
      alt:RI(28000,42000), spd:RI(420,560),
      vrate:R(-800,800), squawk:String(RI(1000,7777)),
      progress:Math.round(prog*100), status:'enroute',
      eta:new Date(Date.now()+R(20,360)*60000).toISOString(),
      distNm:Math.round(R(50,3500)), isLive:false,
    }
  })
}

function setCount(n, isMock) {
  document.getElementById('s-count').innerHTML = isMock
    ? `<span style="color:var(--orange)" title="Demo data">⚠ ${n.toLocaleString()} demo</span>`
    : `<span style="color:var(--muted)">${n.toLocaleString()} aircraft</span>`
}

// ─── Data loop ────────────────────────────────────────────────────────
async function initData() {
  setCount(0, false)
  if (ST.useLive) {
    const ok = await fetchOpenSky()
    if (!ok) { ST.flights = generateMock(); setCount(ST.flights.length, true) }
  } else {
    ST.flights = generateMock()
    setCount(ST.flights.length, true)
  }
  updateMarkers()
  renderSidebar()
}

// Refresh from OpenSky every 15s; extrapolate positions every 2s
setInterval(async () => {
  if (ST.useLive) {
    const ok = await fetchOpenSky()
    if (ok) { updateMarkers(); renderSidebar() }
  }
}, 15000)

setInterval(() => {
  ST.flights = ST.flights.map(f => {
    if (!f.spd || !f.hdg) return f
    const deg = (f.spd * 1852) / 111320 / 3600 * 2
    const rad = (f.hdg * Math.PI) / 180
    return {...f, lat: f.lat + Math.cos(rad)*deg, lon: f.lon + Math.sin(rad)*deg}
  })
  updateMarkers()
}, 2000)

// ─── Map ──────────────────────────────────────────────────────────────
let map, markers={}, activePopup=null

function initMap() {
  mapboxgl.accessToken = MAPBOX_TOKEN
  map = new mapboxgl.Map({
    container:'map', style:MAP_STYLES.dark,
    center:[0,30], zoom:2.5, attributionControl:false, antialias:true
  })
  map.on('load', () => {
    map.setFog({color:'rgb(10,10,20)','high-color':'rgb(20,30,60)','horizon-blend':.02,'space-color':'rgb(5,5,15)','star-intensity':.6})
    initData()
  })
  map.on('zoom', () => { document.getElementById('s-zoom').textContent = map.getZoom().toFixed(1) })
}

function filteredFlights() {
  return ST.flights.filter(f => {
    if (f.alt > ST.filters.maxAlt) return false
    if (f.spd > ST.filters.maxSpeed) return false
    return true
  })
}

function updateMarkers() {
  const visible = filteredFlights()
  const visIds = new Set(visible.map(f => f.id))

  // Remove stale
  Object.keys(markers).forEach(id => {
    if (!visIds.has(id)) { markers[id].remove(); delete markers[id] }
  })

  visible.forEach(f => {
    const selected = f.id === ST.selectedId
    const fill = selected ? '#93c5fd' : '#3b82f6'
    const glow = selected ? 'drop-shadow(0 0 8px rgba(147,197,253,0.9))' : 'drop-shadow(0 0 4px rgba(59,130,246,0.6))'

    if (markers[f.id]) {
      markers[f.id].setLngLat([f.lon, f.lat])
      const inner = markers[f.id].getElement().querySelector('.pi')
      if (inner) inner.style.transform = `rotate(${f.hdg}deg)`
      const svg = markers[f.id].getElement().querySelector('svg')
      if (svg) { svg.setAttribute('fill', fill); svg.style.filter = glow }
    } else {
      const outer = document.createElement('div')
      outer.style.cssText = 'width:24px;height:24px;cursor:pointer'

      const inner = document.createElement('div')
      inner.className = 'pi'
      inner.style.cssText = `width:24px;height:24px;transform:rotate(${f.hdg}deg);transition:transform 2s ease;display:flex;align-items:center;justify-content:center`
      inner.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="${fill}" style="filter:${glow};transition:fill .3s,filter .3s"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`

      outer.appendChild(inner)
      outer.addEventListener('click', () => selectFlight(f.id))
      outer.addEventListener('mouseenter', () => {
        if (activePopup) activePopup.remove()
        activePopup = new mapboxgl.Popup({closeButton:false, offset:16})
          .setLngLat([f.lon, f.lat])
          .setHTML(`<div class="tt"><div class="tt-flight">${f.callsign}</div><div class="tt-route">${f.orig.iata} → ${f.dest.iata}</div><div class="tt-data">${fmtAlt(f.alt)} · ${fmtSpd(f.spd)}</div></div>`)
          .addTo(map)
      })
      outer.addEventListener('mouseleave', () => { if (activePopup) { activePopup.remove(); activePopup = null } })

      markers[f.id] = new mapboxgl.Marker({element:outer, anchor:'center'}).setLngLat([f.lon,f.lat]).addTo(map)
    }
  })
}

// ─── Flight path ──────────────────────────────────────────────────────
function drawPath(f) {
  clearPath()
  if (!map.isStyleLoaded()) return

  // Points: origin → current → destination
  const makeLine = (a, b, steps=40) => {
    const pts = []
    for (let i=0; i<=steps; i++) {
      const t = i/steps
      pts.push([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t])
    }
    return pts
  }

  const cur = [f.lon, f.lat]
  const ori = [f.orig.lon||0, f.orig.lat||0]
  const dst = [f.dest.lon||0, f.dest.lat||0]

  const donePts = (ori[0]||ori[1]) ? makeLine(ori, cur) : [cur, cur]
  const remPts  = (dst[0]||dst[1]) ? makeLine(cur, dst) : [cur, cur]

  const addLayer = (id, coords, color, opacity, dash) => {
    if (!map.getSource(id)) {
      map.addSource(id, {type:'geojson', data:{type:'Feature',geometry:{type:'LineString',coordinates:coords}}})
      const paint = {'line-color':color,'line-width':2,'line-opacity':opacity}
      if (dash) paint['line-dasharray'] = dash
      map.addLayer({id, type:'line', source:id, layout:{'line-cap':'round','line-join':'round'}, paint})
    } else {
      map.getSource(id).setData({type:'Feature',geometry:{type:'LineString',coordinates:coords}})
    }
  }

  addLayer('path-done', donePts, '#3b82f6', 0.4, [2,3])
  addLayer('path-rem',  remPts,  '#60a5fa', 0.75, [4,3])

  // Airport labels if we have real coords
  const features = []
  if (f.orig.lon||f.orig.lat) features.push({type:'Feature',geometry:{type:'Point',coordinates:ori},properties:{label:f.orig.iata}})
  if (f.dest.lon||f.dest.lat) features.push({type:'Feature',geometry:{type:'Point',coordinates:dst},properties:{label:f.dest.iata}})

  if (features.length) {
    const fc = {type:'FeatureCollection',features}
    if (!map.getSource('path-ap')) {
      map.addSource('path-ap', {type:'geojson',data:fc})
      map.addLayer({id:'path-ap-c',type:'circle',source:'path-ap',paint:{'circle-radius':5,'circle-color':'#0f1117','circle-stroke-width':2,'circle-stroke-color':'#60a5fa'}})
      map.addLayer({id:'path-ap-l',type:'symbol',source:'path-ap',layout:{'text-field':['get','label'],'text-size':11,'text-offset':[0,-1.2],'text-anchor':'bottom','text-font':['DIN Offc Pro Medium','Arial Unicode MS Bold']},paint:{'text-color':'#e2e8f0','text-halo-color':'#0f1117','text-halo-width':2}})
    } else {
      map.getSource('path-ap').setData(fc)
    }
  }
}

function clearPath() {
  ['path-ap-l','path-ap-c','path-rem','path-done'].forEach(id => { try { map.removeLayer(id) } catch(_){} })
  ;['path-ap','path-rem','path-done'].forEach(id => { try { map.removeSource(id) } catch(_){} })
}

// ─── Selection ────────────────────────────────────────────────────────
function selectFlight(id) {
  ST.selectedId = id
  const f = ST.flights.find(x => x.id === id)
  if (!f) return
  updateMarkers()
  map.flyTo({center:[f.lon,f.lat], zoom:Math.max(map.getZoom(),6), duration:900, essential:true})
  drawPath(f)
  openPanel(f)
  if (ST.activeTab === 'live') renderLiveList()
}

function closePanel() {
  document.getElementById('dp').classList.remove('open')
  ST.selectedId = null
  clearPath()
  updateMarkers()
  if (ST.activeTab === 'live') renderLiveList()
}

function openPanel(f) {
  document.getElementById('p-fn').textContent = f.callsign
  document.getElementById('p-an').textContent = `${FLAG(f.airline.cc)} ${f.airline.name}`

  const isSaved = ST.saved.includes(f.id)
  const sCls = {enroute:'s-er',boarding:'s-bd',delayed:'s-dl',landed:'s-ld',cancelled:'s-cn',approaching:'s-er'}
  const sLbl = {enroute:'En Route',boarding:'Boarding',delayed:'Delayed',landed:'Landed',cancelled:'Cancelled',approaching:'Approaching'}

  document.getElementById('p-body').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <span class="sbadge ${sCls[f.status]||'s-er'}">${sLbl[f.status]||'En Route'}</span>
      <span style="font-size:12px">${FLAG(f.airline.cc)} ${f.airline.iata}</span>
    </div>

    <div class="rcard">
      <div class="rrow">
        <div class="rap">
          <div class="riata">${f.orig.iata}</div>
          <div class="rcity">${f.orig.city}</div>
        </div>
        <div class="rmid">
          <div class="rplane">✈</div>
          <div class="rlw">
            <div class="rdone" style="width:${f.progress}%"></div>
            <div class="rrem"></div>
          </div>
          <div class="rpct">${f.progress}%</div>
        </div>
        <div class="rap" style="text-align:right">
          <div class="riata">${f.dest.iata}</div>
          <div class="rcity">${f.dest.city}</div>
          ${f.eta ? `<div class="rtime">${fmtTime(f.eta)}</div>` : ''}
        </div>
      </div>
      <div class="pbar"><div class="pfill" style="width:${f.progress}%"></div></div>
    </div>

    <div class="tgrid">
      <div class="tile"><div class="tlbl"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Altitude</div><div class="tval">${fmtAlt(f.alt)}</div></div>
      <div class="tile"><div class="tlbl"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Speed</div><div class="tval">${fmtSpd(f.spd)}</div></div>
      <div class="tile"><div class="tlbl"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>Heading</div><div class="tval">${Math.round(f.hdg)}°</div></div>
      <div class="tile"><div class="tlbl"><svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="4"/><polyline points="6 10 12 4 18 10"/></svg>V/Rate</div><div class="tval ${f.vrate>100?'up':f.vrate<-100?'dn':''}">${f.vrate>0?'+':''}${Math.round(f.vrate)} fpm</div></div>
      ${f.eta?`<div class="tile"><div class="tlbl"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>ETA</div><div class="tval" style="font-size:11px">${fmtFromNow(f.eta)}</div></div>`:''}
      ${f.distNm?`<div class="tile"><div class="tlbl"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>Distance</div><div class="tval" style="font-size:11px">${f.distNm.toLocaleString()} nm</div></div>`:''}
    </div>

    <div class="slbl">Aircraft</div>
    <div class="icard">
      ${[['ICAO24',f.icao24],['Callsign',f.callsign],['Type',f.acType.name],['Squawk',f.squawk],['Airline',f.airline.name]].map(([k,v])=>`<div class="irow"><span class="ik">${k}</span><span class="iv">${v}</span></div>`).join('')}
    </div>

    ${f.isLive ? '<div style="font-size:10px;color:var(--muted);text-align:center;padding:4px">📡 Live data from OpenSky Network</div>' : '<div style="font-size:10px;color:var(--orange);text-align:center;padding:4px">⚠ Demo data — OpenSky unavailable</div>'}
  `

  document.getElementById('p-actions').innerHTML = `
    <button class="abtn primary ${isSaved?'on':''}" onclick="toggleSave('${f.id}')">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      ${isSaved?'Saved':'Save'}
    </button>
    <button class="abtn" onclick="toast('Link copied!');navigator.clipboard?.writeText(location.href+'?f='+encodeURIComponent('${f.callsign}'))">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Share
    </button>
  `

  document.getElementById('dp').classList.add('open')
}

function toggleSave(id) {
  const idx = ST.saved.indexOf(id)
  if (idx > -1) ST.saved.splice(idx, 1)
  else ST.saved.push(id)
  localStorage.setItem('st_saved', JSON.stringify(ST.saved))
  const f = ST.flights.find(x => x.id === id)
  if (f) openPanel(f)
}

// ─── Sidebar ──────────────────────────────────────────────────────────
function setTab(tab, el) {
  ST.activeTab = tab
  document.querySelectorAll('.sb-tab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  renderSidebar()
}

function renderSidebar() {
  if (ST.activeTab === 'live') renderLiveList()
  else if (ST.activeTab === 'filters') renderFilters()
  else if (ST.activeTab === 'airports') renderAirportsList()
  else if (ST.activeTab === 'saved') renderSavedList()
}

function renderLiveList() {
  if (ST.activeTab !== 'live') return
  const list = filteredFlights().slice(0, 80)
  document.getElementById('sb-body').innerHTML = `
    <div class="live-bar">
      <div class="live-ind"><div class="live-dot"></div><span class="live-lbl">${ST.useLive?'Live':'Demo'}</span></div>
      <span class="live-cnt">${ST.flights.length.toLocaleString()} tracked</span>
    </div>
    ${list.map(f=>`
      <div class="fi ${f.id===ST.selectedId?'sel':''}" onclick="selectFlight('${f.id}')">
        <div class="fi-top"><span class="fi-cs">${f.callsign}</span><span class="fi-al">${FLAG(f.airline.cc)} ${f.airline.iata}</span></div>
        <div class="fi-route">
          <span class="fi-iata">${f.orig.iata}</span>
          <div class="fi-bar"><div class="fi-fill" style="width:${f.progress}%"></div><div class="fi-dot" style="left:${f.progress}%"></div></div>
          <span class="fi-iata">${f.dest.iata}</span>
        </div>
        <div class="fi-stats"><span>${fmtAlt(f.alt)}</span><span>·</span><span>${fmtSpd(f.spd)}</span><span>·</span><span>${f.icao24}</span></div>
      </div>
    `).join('')}
  `
}

function renderFilters() {
  document.getElementById('sb-body').innerHTML = `
    <div class="f-sec">
      <div class="f-title">Filters <button class="f-reset" onclick="resetFilters()">Reset</button></div>
      <div class="f-lbl">Max Altitude</div>
      <div class="f-sw">
        <div class="f-sh"><span></span><span class="f-sv" id="fav">${(ST.filters.maxAlt/1000).toFixed(0)}k ft</span></div>
        <input type="range" min="0" max="60000" step="1000" value="${ST.filters.maxAlt}" oninput="ST.filters.maxAlt=+this.value;document.getElementById('fav').textContent=(+this.value/1000).toFixed(0)+'k ft';updateMarkers()"/>
      </div>
      <div class="f-lbl">Max Speed</div>
      <div class="f-sw">
        <div class="f-sh"><span></span><span class="f-sv" id="fsv">${ST.filters.maxSpeed} kts</span></div>
        <input type="range" min="0" max="700" step="10" value="${ST.filters.maxSpeed}" oninput="ST.filters.maxSpeed=+this.value;document.getElementById('fsv').textContent=+this.value+' kts';updateMarkers()"/>
      </div>
    </div>
  `
}

function resetFilters() {
  ST.filters = {cats:[], maxAlt:60000, maxSpeed:700}
  updateMarkers(); renderFilters()
}

function renderAirportsList() {
  document.getElementById('sb-body').innerHTML = AIRPORTS.map(a=>`
    <div class="fi" onclick="openAirportModal('${a.icao}');map.flyTo({center:[${a.lon},${a.lat}],zoom:9,duration:1000})">
      <div class="fi-top"><span class="fi-cs">${a.iata}</span><span class="fi-al">${FLAG(a.cc)}</span></div>
      <div style="font-size:12px;margin-bottom:3px">${a.name}</div>
      <div style="font-size:11px;color:var(--muted)">${a.city}</div>
    </div>
  `).join('')
}

function renderSavedList() {
  const saved = ST.saved.map(id => ST.flights.find(f=>f.id===id)).filter(Boolean)
  if (!saved.length) {
    document.getElementById('sb-body').innerHTML = `<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><p class="empty-txt">Save flights using the star button in the detail panel</p></div>`
    return
  }
  document.getElementById('sb-body').innerHTML = saved.map(f=>`
    <div class="fi ${f.id===ST.selectedId?'sel':''}" onclick="selectFlight('${f.id}')">
      <div class="fi-top"><span class="fi-cs">${f.callsign}</span><span class="fi-al">${FLAG(f.airline.cc)}</span></div>
      <div class="fi-route">
        <span class="fi-iata">${f.orig.iata}</span>
        <div class="fi-bar"><div class="fi-fill" style="width:${f.progress}%"></div></div>
        <span class="fi-iata">${f.dest.iata}</span>
      </div>
    </div>
  `).join('')
}

// ─── Search ───────────────────────────────────────────────────────────
const siEl = document.getElementById('si')
const sdEl = document.getElementById('sd')
const scEl = document.getElementById('sc')

siEl.addEventListener('input', () => {
  const q = siEl.value.trim()
  scEl.style.display = q ? 'block' : 'none'
  if (q.length < 2) { sdEl.innerHTML=''; sdEl.classList.remove('open'); return }
  doSearch(q)
})
siEl.addEventListener('focus', () => { if (siEl.value.trim().length>=2) sdEl.classList.add('open') })
document.addEventListener('click', e => { if (!document.getElementById('sw').contains(e.target)) sdEl.classList.remove('open') })

function clearSearch() {
  siEl.value=''; scEl.style.display='none'; sdEl.innerHTML=''; sdEl.classList.remove('open')
}

function doSearch(q) {
  const ql = q.toLowerCase()
  const fRes = ST.flights.filter(f=>f.callsign.toLowerCase().includes(ql)||f.icao24.toLowerCase().includes(ql)).slice(0,5)
  const aRes = AIRPORTS.filter(a=>a.name.toLowerCase().includes(ql)||a.iata.toLowerCase().includes(ql)||a.icao.toLowerCase().includes(ql)||a.city.toLowerCase().includes(ql)).slice(0,4)

  let html = ''
  if (fRes.length) {
    html += `<div class="ds-label">Flights</div>`
    html += fRes.map(f=>`<div class="dr" onclick="selectFlight('${f.id}');sdEl.classList.remove('open')"><div class="dr-icon"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="var(--blue)"/></svg></div><div><div class="dr-t">${f.callsign}</div><div class="dr-s">${f.orig.iata} → ${f.dest.iata}</div></div></div>`).join('')
  }
  if (aRes.length) {
    html += `<div class="ds-label">Airports</div>`
    html += aRes.map(a=>`<div class="dr" onclick="openAirportModal('${a.icao}');map.flyTo({center:[${a.lon},${a.lat}],zoom:9,duration:1000});sdEl.classList.remove('open')"><div class="dr-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div><div><div class="dr-t">${a.iata} · ${a.name}</div><div class="dr-s">${a.city} ${FLAG(a.cc)}</div></div></div>`).join('')
  }
  if (!html) html = `<div class="no-res">No results for "${q}"</div>`
  sdEl.innerHTML = html
  sdEl.classList.add('open')
}

// ─── Airport modal ────────────────────────────────────────────────────
function openAirportModal(icao) {
  ST.airportIcao = icao
  const ap = AIRPORTS.find(a=>a.icao===icao)
  document.getElementById('m-name').textContent = ap ? `${ap.iata} · ${ap.name}` : icao
  document.getElementById('m-sub').textContent = ap ? `${FLAG(ap.cc)} ${ap.city} · ${ap.icao}` : ''
  document.getElementById('am').classList.add('open')
  setAirportTab('dep', document.querySelector('.mtab'))
}
function closeAirportModal() { document.getElementById('am').classList.remove('open') }

function setAirportTab(tab, el) {
  ST.airportTab = tab
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'))
  if (el) el.classList.add('active')
  renderBoard()
}

function renderBoard() {
  const isDep = ST.airportTab === 'dep'
  const sList = Object.values(AIRLINE_MAP)
  const rows = Array.from({length:14}, (_,i) => {
    const al = PK(sList)
    const peer = PK(AIRPORTS.filter(a=>a.icao!==ST.airportIcao))
    const t = new Date(Date.now()+R(-90,240)*60000)
    const delay = Math.random()>.72 ? RI(5,75) : 0
    const statuses = isDep ? ['Scheduled','Boarding','Departed','Delayed'] : ['En Route','Approaching','Landed','Delayed']
    return {al, peer, t, delay, status:delay?'Delayed':PK(statuses), gate:`${String.fromCharCode(65+RI(0,8))}${RI(1,30)}`, fn:`${al.iata}${RI(100,9999)}`}
  })
  const sCls = {Delayed:'s-dl',Landed:'s-ld',Boarding:'s-bd','En Route':'s-er',Approaching:'s-er',Departed:'s-er',Scheduled:'s-bd'}
  document.getElementById('m-board').innerHTML = `
    <table>
      <thead><tr><th>Flight</th><th>${isDep?'To':'From'}</th><th>Time</th><th>Gate</th><th>Status</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td><div style="font-weight:600">${r.fn}</div><div style="font-size:10px;color:var(--muted)">${r.al.name}</div></td>
          <td><div style="font-weight:500">${r.peer.iata}</div><div style="font-size:10px;color:var(--muted)">${r.peer.city}</div></td>
          <td><div class="tmono">${fmtTime(r.t.toISOString())}</div>${r.delay?`<div class="dly">+${r.delay}m</div>`:''}</td>
          <td class="tmono">${r.gate}</td>
          <td><span class="sbadge ${sCls[r.status]||'s-er'}">${r.status}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  `
}

// ─── Settings ─────────────────────────────────────────────────────────
function openSettings() { document.getElementById('sm').classList.add('open') }
function closeSettings() { document.getElementById('sm').classList.remove('open') }

function setMapStyle(style, el) {
  ST.settings.mapStyle = style
  document.querySelectorAll('#style-opts .obtn').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  map.setStyle(MAP_STYLES[style])
  map.once('styledata', () => updateMarkers())
  toast(`Map: ${style}`)
}

function setUnits(units, el) {
  ST.settings.units = units
  document.querySelectorAll('#unit-opts .obtn').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  renderSidebar()
  if (ST.selectedId) { const f=ST.flights.find(x=>x.id===ST.selectedId); if(f) openPanel(f) }
}

function toggleLive(el) {
  ST.useLive = !ST.useLive
  el.classList.toggle('on', ST.useLive)
  if (!ST.useLive) { ST.flights = generateMock(); setCount(ST.flights.length, true); updateMarkers(); renderSidebar() }
  else initData()
}

function cycleStyle() {
  const idx = STYLE_KEYS.indexOf(ST.settings.mapStyle)
  const next = STYLE_KEYS[(idx+1) % STYLE_KEYS.length]
  ST.settings.mapStyle = next
  map.setStyle(MAP_STYLES[next])
  map.once('styledata', () => updateMarkers())
  toast(`Map: ${next}`)
}

function toggleSidebar() {
  ST.sidebarOpen = !ST.sidebarOpen
  document.getElementById('sidebar').classList.toggle('hidden', !ST.sidebarOpen)
  document.getElementById('menu-btn').classList.toggle('active', ST.sidebarOpen)
}

// ─── Boot ─────────────────────────────────────────────────────────────
initMap()
</script>
</body>
</html>
