<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyTrace — Live Flight Tracker</title>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0b0e;
      --surface1:  #0f1117;
      --surface2:  #161822;
      --surface3:  #1c1f2e;
      --surface4:  #232638;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --blue:      #3b82f6;
      --blue-dim:  rgba(59,130,246,0.15);
      --blue-glow: rgba(59,130,246,0.35);
      --green:     #22c55e;
      --orange:    #f59e0b;
      --red:       #ef4444;
      --purple:    #8b5cf6;
      --glass-bg:  rgba(15,17,23,0.82);
      --radius:    14px;
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }

    /* ── Glass utility ──────────────────────────────────────────── */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
    }

    /* ── Map ────────────────────────────────────────────────────── */
    #map { position: fixed; inset: 0; width: 100%; height: 100%; }
    .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right, .mapboxgl-ctrl-attrib { display: none !important; }

    /* ── Top Nav ────────────────────────────────────────────────── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px; display: flex; align-items: center; gap: 10px; padding: 0 14px;
      background: var(--glass-bg); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }

    .logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text); flex-shrink: 0;
    }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--blue); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 12px var(--blue-glow);
    }
    .logo-icon svg { width: 14px; height: 14px; fill: white; }
    .logo-text { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }

    .nav-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    /* Search */
    #search-wrap { position: relative; flex: 1; max-width: 420px; }
    #search-input {
      width: 100%; height: 32px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-family: var(--font);
      font-size: 13px; padding: 0 32px 0 32px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: rgba(59,130,246,.5); box-shadow: 0 0 0 3px var(--blue-dim); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    .search-icon svg { width: 13px; height: 13px; stroke: var(--muted); fill: none; stroke-width: 2; }
    #search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted); display: none;
      padding: 2px; line-height: 0;
    }
    #search-clear svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* Search dropdown */
    #search-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--surface1); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,.6); overflow: hidden; display: none; z-index: 200;
    }
    #search-dropdown.open { display: block; }
    .dropdown-section-label { font-size: 10px; color: var(--muted); padding: 10px 12px 4px; text-transform: uppercase; letter-spacing: .06em; }
    .search-result {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      cursor: pointer; transition: background .15s;
    }
    .search-result:hover { background: rgba(255,255,255,.04); }
    .result-icon {
      width: 28px; height: 28px; border-radius: 8px; background: var(--surface3);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .result-icon svg { width: 13px; height: 13px; stroke: var(--muted); fill: none; stroke-width: 2; }
    .result-title { font-size: 13px; font-weight: 500; }
    .result-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .no-results { padding: 20px 12px; text-align: center; font-size: 13px; color: var(--muted); }

    /* Nav buttons */
    .nav-btn {
      display: flex; align-items: center; gap: 6px; padding: 0 10px; height: 30px;
      border-radius: 8px; border: none; background: none; color: var(--muted);
      font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer;
      transition: color .15s, background .15s; white-space: nowrap; text-decoration: none;
    }
    .nav-btn:hover { color: var(--text); background: rgba(255,255,255,.05); }
    .nav-btn.active { color: var(--blue); background: var(--blue-dim); }
    .nav-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      position: fixed; left: 0; top: 52px; bottom: 0; width: 268px; z-index: 90;
      background: var(--glass-bg); border-right: 1px solid var(--border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      transform: translateX(0); transition: transform .35s cubic-bezier(.16,1,.3,1);
    }
    #sidebar.hidden { transform: translateX(-100%); }

    /* Sidebar tabs */
    .sidebar-tabs {
      display: flex; gap: 4px; padding: 8px; border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .sidebar-tabs::-webkit-scrollbar { display: none; }
    .sidebar-tab {
      display: flex; align-items: center; gap: 5px; padding: 5px 9px;
      border-radius: 8px; border: none; background: none; color: var(--muted);
      font-family: var(--font); font-size: 11px; font-weight: 500; cursor: pointer;
      transition: all .15s; white-space: nowrap; flex-shrink: 0;
    }
    .sidebar-tab:hover { color: var(--text); background: rgba(255,255,255,.05); }
    .sidebar-tab.active { color: var(--blue); background: var(--blue-dim); }
    .sidebar-tab svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* Sidebar content */
    .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent; }
    .sidebar-content::-webkit-scrollbar { width: 3px; }
    .sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* Live stats bar */
    .live-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 4px; }
    .live-indicator { display: flex; align-items: center; gap: 6px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .live-count { font-size: 11px; color: var(--muted); }
    .live-label { font-size: 11px; color: var(--green); font-weight: 500; }

    /* Flight list items */
    .flight-item {
      padding: 10px; border-radius: 10px; cursor: pointer;
      transition: background .15s; margin-bottom: 2px;
    }
    .flight-item:hover { background: rgba(255,255,255,.04); }
    .flight-item.selected { background: var(--blue-dim); outline: 1px solid rgba(59,130,246,.3); }
    .fi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .fi-callsign { font-size: 13px; font-weight: 600; }
    .fi-airline { font-size: 11px; color: var(--muted); }
    .fi-route { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .fi-iata { font-size: 11px; font-weight: 600; }
    .fi-progress-bar { flex: 1; height: 2px; background: var(--surface3); border-radius: 1px; position: relative; }
    .fi-progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--blue); border-radius: 1px; }
    .fi-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); position: absolute; top: 50%; transform: translate(-50%, -50%); }
    .fi-stats { display: flex; gap: 10px; font-size: 10px; color: var(--muted); font-family: var(--mono); }

    /* Filter section */
    .filter-section { padding: 4px; }
    .filter-title { font-size: 12px; font-weight: 600; margin-bottom: 12px; padding: 0 4px; display: flex; align-items: center; justify-content: space-between; }
    .filter-reset { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: var(--font); }
    .filter-reset:hover { color: var(--text); }
    .filter-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; padding: 0 4px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
    .chip {
      padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 500;
      background: var(--surface3); color: var(--muted); border: none; cursor: pointer;
      font-family: var(--font); transition: all .15s;
    }
    .chip:hover { color: var(--text); }
    .chip.active { background: var(--blue-dim); color: var(--blue); }
    .filter-slider-wrap { margin-bottom: 14px; }
    .filter-slider-head { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .filter-slider-val { font-size: 10px; font-family: var(--mono); color: var(--text); }
    input[type=range] { width: 100%; accent-color: var(--blue); cursor: pointer; }

    /* Empty states */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; gap: 10px; }
    .empty-icon { width: 48px; height: 48px; border-radius: 14px; background: var(--surface3); display: flex; align-items: center; justify-content: center; }
    .empty-icon svg { width: 22px; height: 22px; stroke: var(--muted); fill: none; stroke-width: 1.5; }
    .empty-text { font-size: 12px; color: var(--muted); line-height: 1.6; max-width: 160px; }

    /* ── Aircraft detail panel ───────────────────────────────────── */
    #detail-panel {
      position: fixed; right: 0; top: 52px; bottom: 0; width: 300px; z-index: 90;
      background: var(--glass-bg); border-left: 1px solid var(--border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform .4s cubic-bezier(.16,1,.3,1);
    }
    #detail-panel.open { transform: translateX(0); }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .panel-title { display: flex; align-items: center; gap: 8px; }
    .panel-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--blue-dim); display: flex; align-items: center; justify-content: center; }
    .panel-icon svg { width: 14px; height: 14px; stroke: var(--blue); fill: none; stroke-width: 2; }
    .panel-flight { font-size: 13px; font-weight: 600; }
    .panel-airline { font-size: 11px; color: var(--muted); }
    .panel-close { width: 26px; height: 26px; border-radius: 7px; border: none; background: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .panel-close:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .panel-close svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .panel-body { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent; }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* Status badge */
    .status-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .status-enroute { color: var(--green); background: rgba(34,197,94,.12); }
    .status-boarding { color: var(--blue); background: var(--blue-dim); }
    .status-delayed { color: var(--orange); background: rgba(245,158,11,.12); }
    .status-landed { color: var(--purple); background: rgba(139,92,246,.12); }
    .status-cancelled { color: var(--red); background: rgba(239,68,68,.12); }

    /* Route display */
    .route-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .route-row { display: flex; align-items: center; gap: 8px; }
    .route-airport { flex: 1; }
    .route-iata { font-size: 22px; font-weight: 700; line-height: 1; }
    .route-city { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .route-time { font-size: 11px; color: var(--blue); margin-top: 3px; font-family: var(--mono); }
    .route-mid { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .route-plane { font-size: 14px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .route-line-wrap { width: 100%; display: flex; align-items: center; gap: 2px; }
    .route-done { height: 2px; border-radius: 1px; background: var(--blue); }
    .route-remain { flex: 1; height: 1px; background: var(--surface4); }
    .route-pct { font-size: 10px; color: var(--muted); }
    .progress-bar { width: 100%; height: 3px; background: var(--surface3); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--blue), #60a5fa); transition: width .5s ease; }

    /* Data tiles */
    .tiles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .tile { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
    .tile-label { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); margin-bottom: 5px; }
    .tile-label svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; }
    .tile-value { font-size: 13px; font-weight: 600; font-family: var(--mono); }
    .tile-value.up { color: var(--green); }
    .tile-value.down { color: var(--orange); }

    /* Info table */
    .info-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
    .info-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .info-row:last-child { border-bottom: none; }
    .info-key { font-size: 11px; color: var(--muted); }
    .info-val { font-size: 11px; font-weight: 500; font-family: var(--mono); }

    /* Weather mini */
    .weather-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
    .weather-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .weather-desc { font-size: 12px; }
    .weather-temp { font-size: 18px; font-weight: 700; }
    .weather-details { font-size: 10px; color: var(--muted); }

    /* Section label */
    .section-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 10px 0 6px; padding: 0 1px; }

    /* Panel actions */
    .panel-actions { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; }
    .action-btn {
      flex: 1; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all .15s;
    }
    .action-btn:hover { background: var(--surface3); }
    .action-btn.primary { background: var(--blue-dim); border-color: rgba(59,130,246,.3); color: var(--blue); }
    .action-btn.primary:hover { background: rgba(59,130,246,.25); }
    .action-btn.primary.active { background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 0 10px var(--blue-glow); }
    .action-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── Map overlays ────────────────────────────────────────────── */
    #zoom-controls {
      position: fixed; right: 14px; top: 50%; transform: translateY(-50%); z-index: 80;
      display: flex; flex-direction: column; gap: 4px;
    }
    .zoom-btn {
      width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--border);
      background: var(--glass-bg); color: var(--text); cursor: pointer; font-size: 16px;
      backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .zoom-btn:hover { background: var(--surface3); }
    .zoom-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    .zoom-divider { height: 1px; background: var(--border); margin: 2px 0; }

    /* Stats bar */
    #stats-bar {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 80;
      display: flex; align-items: center; gap: 14px; padding: 8px 18px; border-radius: 20px;
      background: var(--glass-bg); border: 1px solid var(--border); backdrop-filter: blur(16px);
      font-size: 11px; white-space: nowrap;
    }
    .stat-item { display: flex; align-items: center; gap: 5px; }
    .stat-divider { width: 1px; height: 12px; background: var(--border); }

    /* Airport modal */
    #airport-modal {
      position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
    }
    #airport-modal.open { display: flex; }
    .modal-box {
      width: 90%; max-width: 720px; max-height: 80vh; border-radius: 20px; overflow: hidden;
      background: var(--surface1); border: 1px solid var(--border); display: flex; flex-direction: column;
      box-shadow: 0 30px 80px rgba(0,0,0,.7);
    }
    .modal-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .modal-close { width: 28px; height: 28px; border-radius: 8px; border: none; background: var(--surface2); color: var(--muted); cursor: pointer; font-size: 16px; transition: all .15s; }
    .modal-close:hover { color: var(--text); background: var(--surface3); }
    .modal-body { flex: 1; overflow-y: auto; padding: 14px 18px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent; }
    .modal-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .modal-tab { padding: 5px 12px; border-radius: 8px; border: none; background: var(--surface2); color: var(--muted); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .modal-tab.active { background: var(--blue-dim); color: var(--blue); }

    /* Board table */
    .board-table { width: 100%; border-collapse: collapse; }
    .board-table th { font-size: 10px; color: var(--muted); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .05em; }
    .board-table td { font-size: 12px; padding: 9px 8px; border-bottom: 1px solid rgba(255,255,255,.04); }
    .board-table tr:last-child td { border-bottom: none; }
    .board-table tr:hover td { background: rgba(255,255,255,.03); }
    .td-mono { font-family: var(--mono); }
    .delay-red { color: var(--orange); font-size: 10px; }

    /* Settings modal */
    #settings-modal {
      position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
    }
    #settings-modal.open { display: flex; }
    .settings-box { width: 90%; max-width: 440px; border-radius: 20px; background: var(--surface1); border: 1px solid var(--border); box-shadow: 0 30px 80px rgba(0,0,0,.7); overflow: hidden; }
    .settings-section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
    .settings-section:last-child { border-bottom: none; }
    .settings-section-title { font-size: 12px; font-weight: 600; margin-bottom: 12px; color: var(--blue); }
    .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-label { font-size: 13px; }
    .setting-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--surface3); border: none; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
    .toggle.on { background: var(--blue); }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: white; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .toggle.on::after { transform: translateX(16px); }
    .option-group { display: flex; gap: 4px; flex-wrap: wrap; }

// ── OpenSky Network API ──────────────────────────────────────────────

// Convert OpenSky state vector to our flight object
function openskyToFlight(state){
  const icao24 = state[O_ICAO]
  const callsign = (state[O_CALL]||'').trim()
  const cc = state[O_CC] || 'UN'
  const lon = state[O_LON]
  const lat = state[O_LAT]
  const balt = state[O_BALT] // barometric altitude in metres
  const onGround = state[O_GND]
  const spd = state[O_SPD]   // m/s
  const hdg = state[O_HDG]   // degrees
  const vrate = state[O_VRATE] // m/s

  if(!lat || !lon || onGround) return null // skip ground aircraft & missing pos

  const altFt = balt ? Math.round(balt * 3.28084) : 0
  const spdKts = spd ? Math.round(spd * 1.94384) : 0
  const vrateFpm = vrate ? Math.round(vrate * 196.85) : 0
  const airline = guessAirline(callsign)

  // We don't get origin/dest from OpenSky free tier, so show what we have
  const orig = {iata:'???', city:'Unknown', lon:0, lat:0, cc:'UN'}
  const dest = {iata:'???', city:'Unknown', lon:0, lat:0, cc:'UN'}

  return {
    id: icao24,
    callsign: callsign || icao24,
    reg: icao24.toUpperCase(),
    icao24: icao24.toUpperCase(),
    airline,
    acType: {icao:'N/A', name:'Unknown type'},
    orig, dest,
    lat, lon,
    hdg: hdg || 0,
    alt: altFt,
    spd: spdKts,
    vrate: vrateFpm,
    squawk: state[O_SQUAWK] || '0000',
    progress: 50, // unknown without route data
    status: 'enroute',
    eta: null,
    distNm: null,
    age: null,
    weather: null,
    countryCode: cc,
  }
}

  return Array.from({length:n},(_,i)=>{
    const al=pick(AIRLINES), ac=pick(AC_TYPES)
    const orig=pick(AIRPORTS); let dest=pick(AIRPORTS); while(dest===orig)dest=pick(AIRPORTS)
    const prog=rand(.05,.95)
    const lat=orig.lat+(dest.lat-orig.lat)*prog + rand(-2,2)
    const lon=orig.lon+(dest.lon-orig.lon)*prog + rand(-2,2)
    const hdg=hdgBetween({lat,lon},{lat:dest.lat,lon:dest.lon})
    const alt=randi(28000,42000), spd=randi(420,560)
    return {
      id:`mock-${i}`, callsign:`${al.iata}${randi(100,9999)}`, reg:`G-XXXX`,
      icao24:Math.random().toString(16).slice(2,8).toUpperCase(),
      airline:al, acType:ac, orig, dest, lat, lon, hdg, alt, spd,
      vrate:rand(-800,800), squawk:String(randi(1000,7777)),
      progress:Math.round(prog*100), status:'enroute',
      eta:new Date(Date.now()+rand(20,360)*60000).toISOString(),
      distNm:Math.round(rand(50,3500)), age:randi(1,18),
      weather:{temp:randi(-55,5), desc:pick(['Clear','Partly cloudy','Overcast']), wind:randi(10,55), windDir:randi(0,360)},
      countryCode: al.cc,
    }
  })
}

let flights = []
let usingMock = false
let fetchInterval = null

// ── Fetch from OpenSky ────────────────────────────────────────────────
async function fetchOpenSky(){
  setLoadingStatus('Fetching live flights…')
  try {
    const res = await fetch(OPENSKY_URL, {
      headers: {'Accept':'application/json'},
      signal: AbortSignal.timeout(12000)
    })

    if(res.status === 429){
      // Rate limited — keep existing flights, retry later
      setLoadingStatus('Rate limited — retrying soon')
      return
    }
    if(!res.ok) throw new Error(`HTTP ${res.status}`)

    const data = await res.json()
    const states = data.states || []

    const parsed = states
      .map(openskyToFlight)
      .filter(Boolean)

    if(parsed.length < 10) throw new Error('Too few results')

    flights = parsed
    usingMock = false
    updateMarkers()
    if(state.activeTab==='live') renderLiveList()
    setLoadingStatus(null, parsed.length)

  } catch(err) {
    console.warn('OpenSky fetch failed:', err.message)
    if(flights.length === 0){
      // First load failed — fall back to mock
      flights = generateMockFlights()
      usingMock = true
      updateMarkers()
      if(state.activeTab==='live') renderLiveList()
      setLoadingStatus(null, flights.length, true)
    }
  }
}

function setLoadingStatus(msg, count, isMock=false){
  const el = document.getElementById('stat-count')
  if(msg){
    el.innerHTML = `<span style="color:var(--muted)">${msg}</span>`
  } else if(isMock){
    el.innerHTML = `<span style="color:var(--orange)" title="OpenSky unavailable — showing demo data">⚠ ${count.toLocaleString()} demo flights</span>`
  } else {
    el.innerHTML = `<span style="color:var(--muted)">${count.toLocaleString()} live aircraft</span>`
  }
}

// Smooth position interpolation between fetches
function animateFlights(){
  if(usingMock){
    // Animate mock flights
    flights = flights.map(f=>{
      const spd=f.spd/3600/60
      const rad=(f.hdg*Math.PI)/180
      return {...f, lat:f.lat+Math.cos(rad)*spd*6, lon:f.lon+Math.sin(rad)*spd*6}
    })
  } else {
    // Gently extrapolate real flight positions between API calls
    flights = flights.map(f=>{
      if(!f.spd || !f.hdg) return f
      const spdDeg = (f.spd * 1852) / 111320 / 3600 * 7 // ~7 seconds of movement
      const rad = (f.hdg * Math.PI) / 180
      return {...f, lat: f.lat + Math.cos(rad)*spdDeg, lon: f.lon + Math.sin(rad)*spdDeg}
    })
  }
  updateMarkers()
}

function filteredFlights(){
  return flights.filter(f=>{
    if(state.filters.categories.length && !state.filters.categories.includes('passenger')) return false
    if(f.alt > state.filters.maxAlt) return false
    if(f.spd > state.filters.maxSpeed) return false
    return true
  })
}

// ── Map ──────────────────────────────────────────────────────────────
let map, markers={}, activePopup=null

function initMap(){
  mapboxgl.accessToken = MAPBOX_TOKEN
  map = new mapboxgl.Map({
    container:'map',
    style: MAP_STYLES.dark,
    center:[0,30], zoom:2.5, pitch:0, bearing:0,
    attributionControl:false, antialias:true
  })
  map.on('load',()=>{
    map.setFog({color:'rgb(10,10,20)','high-color':'rgb(20,30,60)','horizon-blend':.02,'space-color':'rgb(5,5,15)','star-intensity':.6})
    animateFlights()
    setInterval(animateFlights, 7000)
  })
  map.on('zoom',()=>{ document.getElementById('zoom-val').textContent=map.getZoom().toFixed(1) })
}

function updateMarkers(){
  const visible=filteredFlights()
  const visIds=new Set(visible.map(f=>f.id))

  // Remove stale markers
  Object.keys(markers).forEach(id=>{
    if(!visIds.has(id)){ markers[id].remove(); delete markers[id] }
  })

  visible.forEach(f=>{
    const selected = f.id === state.selectedId
    const fillColor = selected ? '#60a5fa' : '#3b82f6'
    const glowColor = selected ? 'rgba(96,165,250,0.9)' : 'rgba(59,130,246,0.6)'

    if(markers[f.id]){
      // Update position
      markers[f.id].setLngLat([f.lon,f.lat])
      // Rotate the INNER div, not the outer — Mapbox owns the outer transform
      const inner = markers[f.id].getElement().querySelector('.plane-inner')
      if(inner) inner.style.transform = `rotate(${f.hdg}deg)`
      // Update colour
      const svg = markers[f.id].getElement().querySelector('svg')
      if(svg){
        svg.setAttribute('fill', fillColor)
        svg.style.filter = `drop-shadow(0 0 5px ${glowColor})`
      }
    } else {
      // Outer div — Mapbox will apply its own translate transform here
      const el = document.createElement('div')
      el.style.cssText = `width:26px;height:26px;cursor:pointer;`

      // Inner div — we rotate this independently
      const inner = document.createElement('div')
      inner.className = 'plane-inner'
      inner.style.cssText = `width:26px;height:26px;transform:rotate(${f.hdg}deg);transition:transform 1.5s ease;display:flex;align-items:center;justify-content:center;`
      inner.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="${fillColor}" style="filter:drop-shadow(0 0 5px ${glowColor});transition:fill .3s"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>`

      el.appendChild(inner)

      el.addEventListener('click', ()=>selectFlight(f.id))
      el.addEventListener('mouseenter', ()=>{
        if(activePopup) activePopup.remove()
        activePopup = new mapboxgl.Popup({closeButton:false, offset:16})
          .setLngLat([f.lon, f.lat])
          .setHTML(`<div class="tooltip-inner"><div class="tooltip-flight">${f.callsign}</div><div class="tooltip-route">${f.orig.iata} → ${f.dest.iata}</div><div class="tooltip-data">${fmtAlt(f.alt)} · ${fmtSpd(f.spd)} · ${f.acType.icao}</div></div>`)
          .addTo(map)
      })
      el.addEventListener('mouseleave', ()=>{ if(activePopup){ activePopup.remove(); activePopup=null } })

      markers[f.id] = new mapboxgl.Marker({element:el, anchor:'center'}).setLngLat([f.lon,f.lat]).addTo(map)
    }
  })
}

// ── Unit formatting ──────────────────────────────────────────────────
function fmtAlt(ft){
  const u=state.settings.units
  if(u==='metric') return `${Math.round(ft*.3048).toLocaleString()} m`
  if(ft>=18000) return `FL${Math.round(ft/100)}`
  return `${ft.toLocaleString()} ft`
}
function fmtSpd(kts){
  const u=state.settings.units
  if(u==='metric') return `${Math.round(kts*1.852)} km/h`
  if(u==='imperial') return `${Math.round(kts*1.15)} mph`
  return `${kts} kts`
}
function fmtTime(iso){ try{const d=new Date(iso);return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}catch{return '--:--'} }
function fmtFromNow(iso){
  const diff=(new Date(iso)-Date.now())/60000
  if(diff<0) return 'Landed'
  if(diff<60) return `${Math.round(diff)}m`
  return `${Math.floor(diff/60)}h ${Math.round(diff%60)}m`
}

// ── Flight path on map ───────────────────────────────────────────────
function drawFlightPath(f){
  clearFlightPath()

  // Build a curved great-circle-ish path: origin → current pos → destination
  const points = interpolatePath(
    [f.orig.lon, f.orig.lat],
    [f.lon, f.lat],
    [f.dest.lon, f.dest.lat],
    60
  )

  const completedPoints = interpolatePath(
    [f.orig.lon, f.orig.lat],
    [f.lon, f.lat],
    [f.lon, f.lat],
    30
  )

  // Completed portion (dimmer)
  if(!map.getSource('path-done')){
    map.addSource('path-done', {type:'geojson', data:{type:'Feature',geometry:{type:'LineString',coordinates:completedPoints}}})
    map.addLayer({id:'path-done', type:'line', source:'path-done', layout:{'line-cap':'round','line-join':'round'}, paint:{'line-color':'#3b82f6','line-width':2,'line-opacity':0.35,'line-dasharray':[2,2]}})
  } else {
    map.getSource('path-done').setData({type:'Feature',geometry:{type:'LineString',coordinates:completedPoints}})
  }

  // Remaining portion (brighter)
  const remainingPoints = interpolatePath(
    [f.lon, f.lat],
    [f.dest.lon, f.dest.lat],
    [f.dest.lon, f.dest.lat],
    30
  )
  if(!map.getSource('path-remain')){
    map.addSource('path-remain', {type:'geojson', data:{type:'Feature',geometry:{type:'LineString',coordinates:remainingPoints}}})
    map.addLayer({id:'path-remain', type:'line', source:'path-remain', layout:{'line-cap':'round','line-join':'round'}, paint:{'line-color':'#60a5fa','line-width':2,'line-opacity':0.7,'line-dasharray':[4,3]}})
  } else {
    map.getSource('path-remain').setData({type:'Feature',geometry:{type:'LineString',coordinates:remainingPoints}})
  }

  // Airport dot markers
  const airports = {type:'FeatureCollection', features:[
    {type:'Feature', geometry:{type:'Point', coordinates:[f.orig.lon, f.orig.lat]}, properties:{label:f.orig.iata}},
    {type:'Feature', geometry:{type:'Point', coordinates:[f.dest.lon, f.dest.lat]}, properties:{label:f.dest.iata}},
  ]}
  if(!map.getSource('path-airports')){
    map.addSource('path-airports', {type:'geojson', data:airports})
    map.addLayer({id:'path-airports-circle', type:'circle', source:'path-airports', paint:{'circle-radius':5,'circle-color':'#1e293b','circle-stroke-width':2,'circle-stroke-color':'#60a5fa','circle-opacity':0.9}})
    map.addLayer({id:'path-airports-label', type:'symbol', source:'path-airports', layout:{'text-field':['get','label'],'text-size':11,'text-offset':[0,-1.2],'text-anchor':'bottom','text-font':['DIN Offc Pro Medium','Arial Unicode MS Bold']}, paint:{'text-color':'#e2e8f0','text-halo-color':'#0f1117','text-halo-width':2}})
  } else {
    map.getSource('path-airports').setData(airports)
  }
}

// Generate interpolated path points between positions
function interpolatePath(start, mid, end, steps){
  const pts = []
  // Start → mid
  for(let i=0; i<=steps/2; i++){
    const t = i / (steps/2)
    pts.push([
      start[0] + (mid[0]-start[0])*t,
      start[1] + (mid[1]-start[1])*t,
    ])
  }
  // Mid → end
  for(let i=1; i<=steps/2; i++){
    const t = i / (steps/2)
    pts.push([
      mid[0] + (end[0]-mid[0])*t,
      mid[1] + (end[1]-mid[1])*t,
    ])
  }
  return pts
}

function clearFlightPath(){
  ['path-airports-label','path-airports-circle','path-remain','path-done'].forEach(id=>{
    if(map.getLayer(id)) map.removeLayer(id)
  })
  ;['path-airports','path-remain','path-done'].forEach(id=>{
    if(map.getSource(id)) map.removeSource(id)
  })
}

          <div class="fi-top">
            <span class="fi-callsign">${a.iata}</span>
            <span class="fi-airline">${flag(a.cc)}</span>
          </div>
          <div style="font-size:12px;color:var(--text);margin-bottom:3px">${a.name}</div>
          <div style="font-size:11px;color:var(--muted)">${a.city}, ${a.cc}</div>
        </div>
      `).join('')}
    </div>
  `
}

function flyToAirport(lat,lon){
  map.flyTo({center:[lon,lat],zoom:8,duration:1000,essential:true})
}

function renderSavedList(){
  const c=document.getElementById('sidebar-content')
  const saved=state.tracked.map(id=>flights.find(f=>f.id===id)).filter(Boolean)
  if(!saved.length){
    c.innerHTML=`<div class="empty-state">
      <div class="empty-icon"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
      <p class="empty-text">Save flights by clicking the star icon in the detail panel</p>
    </div>` ; return
  }
  c.innerHTML=saved.map(f=>`
    <div class="flight-item" onclick="selectFlight('${f.id}')">
      <div class="fi-top"><span class="fi-callsign">${f.callsign}</span><span class="fi-airline">${flag(f.airline.cc)}</span></div>
      <div class="fi-route">
        <span class="fi-iata">${f.orig.iata}</span>
        <div class="fi-progress-bar"><div class="fi-progress-fill" style="width:${f.progress}%"></div></div>
        <span class="fi-iata">${f.dest.iata}</span>
      </div>
    </div>
  `).join('')
}

// ── Search ───────────────────────────────────────────────────────────
const searchInput=document.getElementById('search-input')
const searchDropdown=document.getElementById('search-dropdown')
const searchClear=document.getElementById('search-clear')

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim()
  searchClear.style.display=q?'block':'none'
  if(q.length<2){searchDropdown.classList.remove('open');return}
  runSearch(q)
})
searchInput.addEventListener('focus',()=>{
  if(searchInput.value.trim().length>=2) searchDropdown.classList.add('open')
})
document.addEventListener('click',e=>{
  if(!document.getElementById('search-wrap').contains(e.target)) searchDropdown.classList.remove('open')
})

function clearSearch(){
  searchInput.value=''; searchClear.style.display='none'
  searchDropdown.innerHTML=''; searchDropdown.classList.remove('open')
}

function runSearch(q){
  const ql=q.toLowerCase()
  const flightResults=flights.filter(f=>f.callsign.toLowerCase().includes(ql)||f.reg.toLowerCase().includes(ql)).slice(0,4)
  const airportResults=AIRPORTS.filter(a=>a.name.toLowerCase().includes(ql)||a.iata.toLowerCase().includes(ql)||a.icao.toLowerCase().includes(ql)||a.city.toLowerCase().includes(ql)).slice(0,4)
  const airlineResults=AIRLINES.filter(al=>al.name.toLowerCase().includes(ql)||al.iata.toLowerCase().includes(ql)).slice(0,3)

  let html=''
  if(flightResults.length){
    html+=`<div class="dropdown-section-label">Flights</div>`
    html+=flightResults.map(f=>`
      <div class="search-result" onclick="selectFlight('${f.id}');searchDropdown.classList.remove('open')">
        <div class="result-icon"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="var(--blue)"/></svg></div>
        <div><div class="result-title">${f.callsign}</div><div class="result-sub">${f.orig.iata} → ${f.dest.iata} · ${f.acType.name}</div></div>
      </div>`).join('')
  }
  if(airportResults.length){
    html+=`<div class="dropdown-section-label">Airports</div>`
    html+=airportResults.map(a=>`
      <div class="search-result" onclick="openAirportModal('${a.icao}');flyToAirport(${a.lat},${a.lon});searchDropdown.classList.remove('open')">
        <div class="result-icon"><svg viewBox="0 0 24 24" stroke="var(--muted)" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>
        <div><div class="result-title">${a.iata} · ${a.name}</div><div class="result-sub">${a.city}, ${a.cc}</div></div>
      </div>`).join('')
  }
  if(airlineResults.length){
    html+=`<div class="dropdown-section-label">Airlines</div>`
    html+=airlineResults.map(al=>`
      <div class="search-result">
        <div class="result-icon"><svg viewBox="0 0 24 24" stroke="var(--muted)" fill="none" stroke-width="2"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19.5 2.5S18 2 16.5 3.5L13 7l-8.2-1.8L3 7l7 4-2 3H6l-1 1 3 2 2 3 1-1v-2l3-2 4 7 2-1-1.8-8.2z"/></svg></div>
        <div><div class="result-title">${al.name}</div><div class="result-sub">${al.iata} · ${flag(al.cc)}</div></div>
      </div>`).join('')
  }
  if(!html) html=`<div class="no-results">No results for "${q}"</div>`
  searchDropdown.innerHTML=html
  searchDropdown.classList.add('open')
}

// ── Airport modal ────────────────────────────────────────────────────
function openAirportModal(icao){
  state.currentAirportIcao=icao
  const ap=AIRPORTS.find(a=>a.icao===icao)
  document.getElementById('modal-airport-name').textContent=ap?`${ap.iata} · ${ap.name}`:icao
  document.getElementById('modal-airport-sub').textContent=ap?`${flag(ap.cc)} ${ap.city}, ${ap.cc} · ICAO: ${ap.icao}`:''
  document.getElementById('airport-modal').classList.add('open')
  setAirportTab('departures', document.querySelector('.modal-tab'))
}

function closeAirportModal(){ document.getElementById('airport-modal').classList.remove('open') }

function setAirportTab(tab, el){
  state.currentAirportTab=tab
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'))
  if(el) el.classList.add('active')
  renderAirportBoard()
}

function renderAirportBoard(){
  const ap=AIRPORTS.find(a=>a.icao===state.currentAirportIcao)
  const isDep=state.currentAirportTab==='departures'
  const rows=Array.from({length:14},(_,i)=>{
    const al=pick(AIRLINES), peer=pick(AIRPORTS.filter(a=>a.icao!==state.currentAirportIcao))
    const t=new Date(Date.now()+rand(-90,240)*60000)
    const delay=Math.random()>.72?randi(5,75):0
    const statuses=isDep?['Scheduled','Boarding','Departed','Delayed']:['En Route','Approaching','Landed','Delayed']
    return {al,peer,t,delay,status:delay?'Delayed':pick(statuses),gate:`${String.fromCharCode(65+randi(0,8))}${randi(1,30)}`,flight:`${al.iata}${randi(100,9999)}`}
  })
  const statusCls={'Delayed':'status-delayed','Landed':'status-landed','Boarding':'status-boarding','En Route':'status-enroute','Approaching':'status-enroute','Departed':'status-enroute','Scheduled':'status-boarding'}
  document.getElementById('modal-board').innerHTML=`
    <table class="board-table">
      <thead><tr>
        <th>Flight</th><th>${isDep?'To':'From'}</th><th>Time</th><th>Gate</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td><div style="font-weight:600">${r.flight}</div><div style="font-size:10px;color:var(--muted)">${r.al.name}</div></td>
          <td><div style="font-weight:500">${r.peer.iata}</div><div style="font-size:10px;color:var(--muted)">${r.peer.city}</div></td>
          <td><div class="td-mono">${fmtTime(r.t.toISOString())}</div>${r.delay?`<div class="delay-red">+${r.delay}m</div>`:''}</td>
          <td class="td-mono">${r.gate}</td>
          <td><span class="status-badge ${statusCls[r.status]||'status-enroute'}">${r.status}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  `
}

// ── Settings ─────────────────────────────────────────────────────────
function openSettings(){ document.getElementById('settings-modal').classList.add('open') }
function closeSettings(){ document.getElementById('settings-modal').classList.remove('open') }

function setMapStyle(style, el){
  state.settings.mapStyle=style
  document.querySelectorAll('#map-style-opts .opt-btn').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  map.setStyle(MAP_STYLES[style])
  map.once('styledata',()=>{ updateMarkers() })
}

function setUnits(units, el){
  state.settings.units=units
  document.querySelectorAll('#units-opts .opt-btn').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  if(state.selectedId){ const f=flights.find(x=>x.id===state.selectedId); if(f)openPanel(f) }
  renderSidebar()
}

function toggleSetting(key, el){
  state.settings[key]=!state.settings[key]
  el.classList.toggle('on', state.settings[key])
}

// ── Map controls ─────────────────────────────────────────────────────
function zoomIn(){ map.zoomIn({duration:300}) }
function zoomOut(){ map.zoomOut({duration:300}) }

const styleKeys=['dark','satellite','terrain','minimal']
function cycleMapStyle(){
  const idx=styleKeys.indexOf(state.settings.mapStyle)
  const next=styleKeys[(idx+1)%styleKeys.length]
  state.settings.mapStyle=next
  map.setStyle(MAP_STYLES[next])
  map.once('styledata',()=>updateMarkers())
  showToast(`Map: ${next.charAt(0).toUpperCase()+next.slice(1)}`)
}

function toggleSidebar(){
  state.sidebarOpen=!state.sidebarOpen
  document.getElementById('sidebar').classList.toggle('hidden',!state.sidebarOpen)
  document.getElementById('toggle-sidebar-btn').classList.toggle('active',state.sidebarOpen)
}

// ── Boot ─────────────────────────────────────────────────────────────
initMap()
renderSidebar()
</script>
</body>
</html>
